# NovTurnIA — CI/CD Pipeline (T-09)
# Flujo: Build → DB Migrations → Deploy (solo en push a main)
#        Build (PRs) → Preview Deploy (Vercel preview URL)
#
# Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
#   VITE_SUPABASE_URL         → Supabase Dashboard → Project Settings → API → Project URL
#   VITE_SUPABASE_ANON_KEY    → Supabase Dashboard → Project Settings → API → anon/public key
#   VITE_SENTRY_DSN           → Sentry Dashboard → Project → Client Keys → DSN
#   SUPABASE_DB_URL           → postgresql://postgres:<password>@db.<project-id>.supabase.co:5432/postgres
#   VERCEL_TOKEN              → vercel.com → Settings → Tokens
#   VERCEL_ORG_ID             → vercel.com → Team Settings → General → Team ID
#   VERCEL_PROJECT_ID         → vercel.com → Project Settings → General → Project ID

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build & lint ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  # ── 2. Apply DB migrations ───────────────────────────────────────────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ── 3. Deploy to Vercel ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 4. Preview deploy para Pull Requests ─────────────────────────────────────
  preview:
    name: Preview Deploy (PR)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy preview
        id: vercel_preview
        run: |
          PREVIEW_URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | tail -1)
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview desplegado\n🔗 ${{ steps.vercel_preview.outputs.url }}`
            })
